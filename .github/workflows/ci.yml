name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci: 
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      START_TOKEN_SECRET: ${{ secrets.START_TOKEN_SECRET }}
      PUZZLE_GENERATOR_URL: ${{ secrets.PUZZLE_GENERATOR_URL }}
      PUZZLE_GENERATOR_API_KEY: ${{ secrets.PUZZLE_GENERATOR_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Docker build smoke check
        run: docker build -t princess-web-ci .

      

      





      
